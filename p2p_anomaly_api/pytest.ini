[pytest]
# Async tests run without explicit @pytest.mark.asyncio decorators.
asyncio_mode = auto
# The DB engine in db/session.py is created once at import and binds its
# connection pool to a single event loop. Keep async fixtures on one
# session-scoped loop so integration tests can share that engine safely.
asyncio_default_fixture_loop_scope = session

# Treat the service root as the import base so `import core`, `ingestion`,
# `features`, `models`, `scoring`, `api`, `db` resolve when run from here.
testpaths = tests

markers =
    unit: fast, DB-free tests of a single module (ingestion, features, scoring, labeler).
    detection: runs the REAL ML pipeline on the labeled fixture and emits evaluation metrics.
    integration: hits the dev Postgres at localhost:2000; auto-skips when the DB is unreachable.

filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning

# Quieter, readable output by default.
addopts = -ra -q
