apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: p2p
  labels:
    app: fastapi
    tier: anomaly
    app.kubernetes.io/part-of: p2p-insight
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: fastapi
        tier: anomaly
    spec:
      containers:
        - name: anomaly-api
          image: p2p-anomaly-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: fastapi-config
            - secretRef:
                name: fastapi-secret
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2560Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 8001
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fastapi
  namespace: p2p
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: fastapi
