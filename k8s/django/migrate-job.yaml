apiVersion: batch/v1
kind: Job
metadata:
  name: django-migrate
  namespace: p2p
  labels:
    app: django
    component: migrate
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: django
        component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: p2p-process-mining:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: django-config
            - secretRef:
                name: django-secret
