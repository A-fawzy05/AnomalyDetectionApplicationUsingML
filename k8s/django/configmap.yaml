apiVersion: v1
kind: ConfigMap
metadata:
  name: django-config
  namespace: p2p
data:
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  DEBUG: "False"
  # Must include the probe Host header value (localhost), the in-cluster service
  # name, and its FQDN so inter-service calls and kubelet probes both pass.
  ALLOWED_HOSTS: "localhost,127.0.0.1,django,django.p2p.svc.cluster.local"
  DB_NAME: "process_mining_db"
  DB_USER: "postgres"
  DB_HOST: "django-postgres"
  DB_PORT: "5432"
  FASTAPI_ANOMALY_SERVICE_URL: "http://fastapi:8001"
  NODEJS_URL: "http://nodejs:3001"
  SLA_DEFAULT_DAYS: "21"
