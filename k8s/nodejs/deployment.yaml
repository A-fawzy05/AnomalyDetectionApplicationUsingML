apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs
  namespace: p2p
  labels:
    app: nodejs
    tier: gateway
    app.kubernetes.io/part-of: p2p-insight
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs
  # Rolling update with zero downtime: never drop below desired count.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nodejs
        tier: gateway
    spec:
      containers:
        - name: gateway
          image: p2p-gateway:latest
          # Use the locally built/loaded image (flash-drive demo); never pull.
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: nodejs-config
            - secretRef:
                name: nodejs-secret
          # Resource requests are REQUIRED for the HPA to compute CPU utilisation.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # --- Self-healing probes ---
          # startup: give the process time to boot before liveness kicks in.
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            periodSeconds: 5
            failureThreshold: 30
          # liveness: restart the container if it stops responding (deadlock/hang).
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          # readiness: pull the pod out of the Service until it can serve traffic.
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
# Keep at least one pod available during voluntary disruptions (node drains, etc.)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nodejs
  namespace: p2p
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nodejs
