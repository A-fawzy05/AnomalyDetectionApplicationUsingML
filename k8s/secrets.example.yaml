# ---------------------------------------------------------------------------
# SECRET TEMPLATE — copy this file to `secrets.yaml`, fill in REAL values, and
# apply it. DO NOT COMMIT the filled-in copy (the real .env values live outside
# git on purpose). The dev Postgres passwords below are non-secret local
# defaults that match docker-compose; the REPLACE_ME values are real secrets.
#
#   cp k8s/secrets.example.yaml k8s/secrets.yaml   # then edit k8s/secrets.yaml
#   kubectl apply -f k8s/secrets.yaml
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: nodejs-secret
  namespace: p2p
type: Opaque
stringData:
  # MongoDB Atlas connection string (external managed DB — not deployed in k8s)
  MONGODB_URI: "REPLACE_ME_mongodb+srv://user:pass@cluster/db"
  JWT_SECRET: "REPLACE_ME_jwt_secret"
  RESEND_API_KEY: "REPLACE_ME_resend_key"
  GOOGLE_CLIENT_ID: "REPLACE_ME_google_client_id"
  GOOGLE_CLIENT_SECRET: "REPLACE_ME_google_client_secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-secret
  namespace: p2p
type: Opaque
stringData:
  # Async SQLAlchemy URL pointing at the in-cluster Postgres service.
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@fastapi-postgres:5432/p2p_db"
  # Password used BOTH by the fastapi-postgres StatefulSet and the URL above.
  POSTGRES_PASSWORD: "postgres"
---
apiVersion: v1
kind: Secret
metadata:
  name: django-secret
  namespace: p2p
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_ME_django_secret_key"
  # Password used BOTH by the django-postgres StatefulSet and Django's DB config.
  DB_PASSWORD: "postgres"
