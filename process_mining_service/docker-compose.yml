version: "3.8"

services:
  web:
    build: .
    container_name: p2p_process_mining_service
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - SECRET_KEY=development-secret-key-do-not-use-in-production
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - DB_NAME=process_mining_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - FASTAPI_ANOMALY_SERVICE_URL=http://host.docker.internal:8001
    volumes:
      - media_data:/app/mediafiles
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "python manage.py migrate && 
               gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 config.wsgi:application"

  db:
    image: postgres:15-alpine
    container_name: p2p_process_mining_db
    environment:
      - POSTGRES_DB=process_mining_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d process_mining_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_data:
