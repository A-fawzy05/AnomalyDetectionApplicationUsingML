name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:

jobs:
  security-audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check .env files are not committed
        run: |
          if git ls-files | grep -qE '(^|/)\.env$'; then
            echo "::error::.env files found in repository!"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: Node-js/package-lock.json

      - name: npm audit
        working-directory: Node-js
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r p2p_anomaly_api/requirements.txt

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: Node-js/package-lock.json

      - name: Build & Test Node.js
        working-directory: Node-js
        run: |
          npm ci
          npm run build --if-present
          npm test --if-present

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Run FastAPI Tests
        run: |
          pip install -r p2p_anomaly_api/requirements.txt pytest
          pytest
