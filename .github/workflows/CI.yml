name: Security, Build & Tests

on:
push:
branches:
- master
- develop
pull_request:

jobs:
security-audit:
name: Secret & Dependency Audit
runs-on: ubuntu-latest


steps:
  - name: Checkout
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  
  - name: Gitleaks Scan
    uses: gitleaks/gitleaks-action@v2
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  - name: Check .env files are not committed
    run: |
      FOUND=$(git ls-files | grep -E '(^|/)\.env$' || true)

      if [ -n "$FOUND" ]; then
        echo ".env files are tracked by git:"
        echo "$FOUND"
        exit 1
      fi

      echo "No .env files committed"

  
  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Install Node Dependencies
    working-directory: Node-js
    run: npm ci

  - name: npm audit
    working-directory: Node-js
    run: npm audit --audit-level=high

  
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install pip-audit
    run: pip install pip-audit

  - name: pip-audit
    run: pip-audit -r p2p_anomaly_api/requirements.txt


dependency-review:
name: Dependency Review
if: github.event_name == 'pull_request'
runs-on: ubuntu-latest


steps:
  - name: Dependency Review
    uses: actions/dependency-review-action@v4


build-and-test:
name: Build Verification & Unit Tests
runs-on: ubuntu-latest


steps:
  - name: Checkout
    uses: actions/checkout@v4

  
  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Install Node Dependencies
    working-directory: Node-js
    run: npm ci

  - name: Build Node.js Application
    working-directory: Node-js
    run: npm run build --if-present

  - name: Run Node.js Unit Tests
    working-directory: Node-js
    run: npm test --if-present

  
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Python Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r p2p_anomaly_api/requirements.txt
      pip install pytest

  - name: Run FastAPI Unit Tests
    run: pytest
```
