name: P2P Platform – CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 3 * * 1"   # full scan every Monday 03:00 UTC

env:
  PYTHON_VERSION: "3.11.9"
  NODE_VERSION: "20"

jobs:

 
  codeql:
    name: CodeQL – ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"


  
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep scan
        run: semgrep ci --config=auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # 3. BANDIT  (runs in parallel with codeql — no dependencies)
  # ──────────────────────────────────────────────────────────────
  bandit:
    name: Bandit Python Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Bandit – FastAPI service
        run: |
          bandit -r p2p_anomaly_api/ \
            -x p2p_anomaly_api/venv,p2p_anomaly_api/venv311,p2p_anomaly_api/tests,p2p_anomaly_api/alembic \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-fastapi.json || true
          bandit -r p2p_anomaly_api/ \
            -x p2p_anomaly_api/venv,p2p_anomaly_api/venv311,p2p_anomaly_api/tests,p2p_anomaly_api/alembic \
            --severity-level medium \
            --confidence-level medium

     

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: bandit-fastapi.json


  # ──────────────────────────────────────────────────────────────
  # 4. ENV AUDIT  (needs: codeql)
  # ──────────────────────────────────────────────────────────────
  env-audit:
    name: Secret & Env Audit
    runs-on: ubuntu-latest
    needs: [codeql]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks – scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check .env files are not committed
        run: |
          FOUND=$(git ls-files | grep -E '(^|/)\.env$' || true)
          if [ -n "$FOUND" ]; then
            echo "❌ .env files are tracked by git:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No .env files committed"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      

      - name: npm audit – Node.js Gateway
        working-directory: Node-js
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit – FastAPI
        run: pip-audit -r p2p_anomaly_api/requirements.txt

      


  # ──────────────────────────────────────────────────────────────
  # 5. NJSSCAN  (needs: env-audit)
  # ──────────────────────────────────────────────────────────────
  njsscan:
    name: NJSScan Node.js Security
    runs-on: ubuntu-latest
    needs: [env-audit]
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install NJSScan
        run: pip install njsscan

      - name: NJSScan – Node.js Gateway
        run: njsscan --exit-warning Node-js/ --sarif -o njsscan-nodejs.sarif || true

      

      - name: Upload SARIF – Node.js Gateway
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: njsscan-nodejs.sarif
          category: njsscan-nodejs

      


  # ──────────────────────────────────────────────────────────────
  # 6. SNYK  (needs: njsscan)
  # ──────────────────────────────────────────────────────────────
  snyk:
    name: Snyk Code & Dependencies
    runs-on: ubuntu-latest
    needs: [njsscan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Snyk Code – SAST (whole repo)
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      

      - name: Snyk Open Source – Frontend
        working-directory: Frontend
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Node.js Gateway – install dependencies
        working-directory: Node-js
        run: npm ci --ignore-scripts

      - name: Snyk Open Source – Node.js Gateway
        working-directory: Node-js
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Snyk Open Source – FastAPI
        run: snyk test --file=p2p_anomaly_api/requirements.txt --package-manager=pip --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      


  # ──────────────────────────────────────────────────────────────
  # 7. BUILD  (needs: snyk + bandit + semgrep — all security done)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build All Services
    runs-on: ubuntu-latest
    needs: [snyk, bandit, semgrep]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend (Next.js) ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Frontend – install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Frontend – build
        working-directory: Frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # ── Node.js Gateway ─────────────────────────────────────
      - name: Node.js – install dependencies
        working-directory: Node-js
        run: npm ci

      # ── Python (shared setup) ───────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # ── FastAPI ─────────────────────────────────────────────
      - name: FastAPI – install dependencies
        working-directory: p2p_anomaly_api
        run: pip install -r requirements.txt

      - name: FastAPI – syntax check
        working-directory: p2p_anomaly_api
        run: python -m py_compile main.py

      

      # ── Docker images ────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker – build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: false
          tags: p2p-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker – build Node.js image
        uses: docker/build-push-action@v5
        with:
          context: ./Node-js
          push: false
          tags: p2p-nodejs:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker – build FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./p2p_anomaly_api
          push: false
          tags: p2p-fastapi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      
