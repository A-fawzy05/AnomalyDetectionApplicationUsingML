name: P2P Platform – CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  env-audit:
    name: Secret & Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check .env files are not committed
        run: |
          FOUND=$(git ls-files | grep -E '(^|/)\.env$' || true)

          if [ -n "$FOUND" ]; then
            echo ".env files are tracked by git:"
            echo "$FOUND"
            exit 1
          fi

          echo "No .env files committed"

     
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node Dependencies
        working-directory: Node-js
        run: npm ci

      - name: npm audit
        working-directory: Node-js
        run: npm audit --audit-level=high

      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit
        run: pip-audit -r p2p_anomaly_api/requirements.txt

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  formatting:
    name: Code Formatting & Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node Dependencies
        working-directory: Node-js
        run: npm ci

      - name: ESLint
        working-directory: Node-js
        run: npm run lint --if-present

      - name: Prettier Check
        working-directory: Node-js
        run: npx prettier . --check

      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Formatters
        run: |
          pip install black ruff

      - name: Black Check
        run: black --check p2p_anomaly_api

      - name: Ruff Check
        run: ruff check p2p_anomaly_api
