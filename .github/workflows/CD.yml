name: Docker Build Check

# Verifies that a Docker image can be built for each of the three backend
# services. Nothing is pushed anywhere — this only proves the Dockerfiles build
# cleanly, so you can confidently build the images locally (and copy them to a
# flash drive) without surprises.
on:
  push:
    branches:
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  docker-build:
    name: Build ${{ matrix.service.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: gateway
            context: Node-js
          - name: anomaly-api
            context: p2p_anomaly_api
          - name: process-mining
            context: process_mining_service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/Dockerfile
          push: false
          load: true
          tags: p2p-${{ matrix.service.name }}:ci
          # GitHub Actions layer cache to speed up repeat builds.
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
